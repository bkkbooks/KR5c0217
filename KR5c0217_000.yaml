body:
  text: 太清調氣經盡五仙經云從半夜子時服九九八十一雞鳴時八八六十四日出時六六三十六食時五五二十五禺中四四一十六夫前法是世人及舊經相傳妄為習眼虛役歲月徒履艱辛功效無成久而反損蓋由不服元氣不識深根諸如此流舉世共矣遂令久服無驗神謝氣萎乎慕道之流虛損性命逡巡之際即枉正年甚可哀矣深非正道不可依行又舊經云頓休糧服氣法畫夜計十二時五百四十咽如此十二時周而復始夫人壯年之時凶荒於利欲未知正氣奚思攝養息志安神及漸年衰五臟巳損不漸修補卒即絶食元氣未充俗食巳絶兩未相接遂致危亡思欲全身不可得也又云以咽多為限以飽為功夫人初服氣百日之內微通及周巳往關節始開初頓服即致飽及成氣疾腹肚脹悶絶非正道初冝少服三年後任意多服但初功人支節未開肌膚猶閉頓即多服腹肚服悶如何得安又云日中巳前為生氣日中巳後為死氣生氣可服死氣不可服是何言也夫人每日雖三頓食或以為客他鄉或公事驅迫節候失時遇食即餐豈候時節氣亦如此但有即服無思生死之氣又云鼻長引氣口滿即咽然後一吐須少每引須多夫服氣之道本名胎息胎息者如嬰兒在母腹中十箇月食而熊長養成就骨細筋柔握固守一者為無思慮故含元氣之故忽出母腹即吸納外氣有啼呌之聲知乾濕飢飽者即失元氣也今鼻引而咽者外也不堪服之又云取生氣趂五方以心面相當存思想念初從東方青氣次南方赤氣次西方白氣次北方黑氣次念中央黃氣皆須以心想念五方氣色服之此即非正也夫服氣者先以無思無慮絶緣息念即兀然和氣自至因而咽之各歸其位無所不定且五方各在五臟何須思念有念即有緣起緣起即心不定心不定即氣不安氣不安即無自鉞無自然即氣失度氣失度即納邪氣納邪氣即病有所生病有所生即百痾相注故黃庭經云但思一部壽無窮非各别住俱腦中列位次坐向外方所存在心即相當斯之謂矣其想五方者不堪服又云咽滿服百令彭彭聲即是妙也凡服氣初須少服為通暢所以候百毛孔開每閉氣無所不發汗遍身頓服千氣亦不壅滯令彭彭聲者是不通暢壅塞耳令人面黃損五臟失心也又云十五日前從手出十五日後從足出夫如存想者為有苦處或時用之無病不合偏有思念故黃庭經云物物不干泰而平謂無想念耳又云初服氣欲休糧滿二十一日即免飢閉氣九十息一咽腹半滿勿令大出莫繫之念使上通髮下通足又云想足却上經腎至喉仍想五色氣閉之夫初頓絶者前巳申訖為五臟頓絶則損人豈有二十一日而能成功免飢如三年功成元氣即住氣海即凝須絶即絶豈限日數動念之理又云十息一息一屈指至一十七息一咽或委氣四九三十六三百六十息一轉側夫正氣咽之時絶思去念存心於無為之境委形於無為之身安能屈指記數但行住坐卧任性自然肚空有便即服豈勞轉側記數也又云口無津液即以棗一兩顆肉喫留核舍之令引液夫如初功人或無智無功未能引得真津液縱以此引得些些終是不真之津亦不得用又鼻但長引氣蹙而咽之良久更服仍須相續連連而下如瓶注水據此直是殺人之法也安可全神又云但閉氣自然飽滿者亦殺人也又云有病即閉氣攻之依五臟吐夫有病即使攻之亦不知如何攻之復攻多少不解節候搜氣亦是殺人之事又云固氣勿下泄必須固之仍以意運令散是何言哉人上有七竅下有二竅若為上膲不通有冷熱者只為三膲氣不和而病如初攻者先須氣通泄上服下應有泄即不可固之並别申之於後服氣法凡服氣先須察氣候識病狀入氣有一出氣有六須知六氣然後服之六氣雖舊經中具説口勢六氣之候如何察之但聞其方誰識其候今具録如後凡欲學服氣者為三膲不通咽氣不可住在上膲即恐心胸悶不通泄先學調理氣候識辨六氣除五臟惡氣然後服之即得清氣下一咽咽有益也凡調氣者先須依門户依門户者鼻為天門口為地戶常從鼻入口吐即為順氣口入鼻出即為逆氣逆氣即壅順氣即宣通依隂陽分理也既知門户逆順隂陽分理必順依此修行無問行住坐卧鼻常引納口常呵吐引則納清吐即出濁濁者因五臟而出之何為濁氣皆同出於口五臟有濁氣為食五味五味各一臟每臟又有六府之氣同湊一門衆穢所衝合成濁氣既有濁氣如何察知凡夜睡皆緣口合則五臟氣塞壅即在喉中每至睡覺時大開口察量即有葷穢之氣自不堪聞因此察知即知氣濁惡也凡口中乾苦澀乳頰無津液或咽喉中痛不能喫食者皆熱狀也即須大開口呵之每呵必須依門户出入呵十氣二十氣即鳴天鼓者叩齒是也叩齒七八下以舌漱華池而咽津液黃庭經云漱咽靈液災不干此之謂也又依喘息氣任自然出入調之三數下又開口大呵呵了又調如此消息察熱氣退盡即止如何得知喉中清水甘漿生即熱氣退五臟涼也黃庭經云玉池清水灌靈根審能修之可長存此即甘漿清水是也常能調察此候五臟必無病生如能察準此候三膲自得通即服氣一一有益功無虛施夫氣者主心心邪則氣邪心正則氣正今所舉手動足喜怒哀樂莫不由心心之動念莫不是氣氣感意意從心如此氣全即身全氣絶即神滅神滅即身死故醫家先診脈者則五臟四時脈并氣候察知病源始尋方藥人但察得氣侯則五臟自和即脈調氣順何以得知五臟主於五氣又主於五方臟氣調即四時順理況能自察口鼻取捨斯須冷熱自不入也又經云何以知其冷熱入氣有一出氣有六其六者咽呵呼噓吹嘻此是六氣六氣者五氣各主一臟餘一氣屬三膲呬屬肺肺主鼻鼻有寒熱不和依呬吐納兼理皮膚瘡痏有此病依狀理之呵屬心主舌乾澀氣不通是熱以呵去之大熱大開口大須作意量事王之過度即損人呼屬脾脾主中宫土如氣微熱不和腹肚脹滿氣悶不通泄以呼理之噓屬肝肝主目如目溫熱可以噓調理之吹屬腎腎主耳如腰腳冷陽道衰弱吹調理之嘻屬三膲也凡以前氣大都雖有此理所是五臟六府三膲冷熱不調都屬於心心主呵但以吐納理之萬病皆愈亦不一一須六氣調之又調氣一依門户出入或多即恐喉中乾如覺乾即合口任鼻中出入即口中津生喉中潤漱取咽之又察之如口中無熱穢氣五臟得和不須調即行住坐卧以舌擁咽之面色光矣又舊經云取子時候生王氣又取六時節候數而服之初服極熱多更無次第節量漸漸修行為人不解者多但依方即用不尋師訣將為真法然及服之時損傷者衆矣或因病生或却損正壽諸如此例其數實繁或言氣之無功或言卒行無益悠悠歲月何有成期或不遇先師修心都退二疑之際即悮此生今為薄以致功皆曾修習損益二理並身經過從茲廣歷歲年真謬俱見以後修行者更無差錯取益日勝愈疾如神驗之斯須臧否立效又初功人皆為三膲未通服氣多在上膲不過氣住則心胸間悶悶即損人未解調理深須作意其初服人先須飯食節候喫物反觸修行次第真心不輟下却三尸捨榮去貴節色遠財然始近道日漸成功長生益壽必無虛棄苟不能依此徒暫知之終無成耳夫修真之人亦有三等任時取理其狀不一亦不能固執略申如左上等之士本性幽間用志清雅發言合道行之無瑕如此之人者有前世之資以石投水無可比之喻上智早發心人也中等人或身居榮祿或勢望高遠或霸業厚姻或名位有望二疑進退倏忽虛捐聞道則寤寐不安思即終朝不息兩心交戰勝者即全逡巡之間十失六七矣喻中智發心晚也下等之士二時巳過蹉跎暮年筋力衰微心神巳喪雖食祿如衣錦夜行日落西傾俄然風燭追神念道其如噬臍靜而思之感歎何極如此之類仍能精心勵志者猶十救可一二矣其八十巳上人罪分巳定祈之他生為此三等之人先賢遺歎表示後人幸察深根發志堅固成功不退福壽無涯豈不善矣夫服氣者本名胎息胎息者如嬰兒在母腹中十箇月不食而能長飬成就骨細筋柔握固守一為初受正氣無思無念兀然凝寂受元氣變化開節臟府皆是自然忽出母腹即吸納外氣而有啼呌之聲即知乾濕飢餓似有所念即失元氣今人所服者如嬰兒在母腹是名胎息服內氣耳舊經云鼻引外氣服者深非正法也夫欲服氣者取夜半後睡覺及五更睡覺依前調氣吐納察量氣候漱咽靈液即仰卧展手及足下著枕即息心定無絶念任氣依門戶喘息出入兀然開口內巳有氣即却引上入口微鼓而咽之下仍以意送即以手摩將心上令氣下即更調氣六七度即更咽一氣依前以手摩將之如咽二十氣且止至明即更隨時任坐卧取方便安穩更咽十餘咽每一咽隔調氣四五十下即徐徐咽非事勿併咽之每一咽必須以手摩令下仍以意送向下便察之如上膲通即咽下過臍如未通即在心胸問住候至食時如覺上空下泄氣通即任喫飯如未飢且勿食如食不得令飽飽即妨服氣食了候心上及腹中微空即更服二十咽巳下又即夜食食了候心上空又服二十咽即止任行住坐卧此以前一日服氣節候與百日同每服一咽皆記手摩合散一咽皆隔十息巳下為妙初服三膲未通關節未開關節未開恐却壅塞不得多服每十日加三五咽百日滿百五十日更加四五咽二百咽周年巳後氣巳通關節巳開皮肉潤毛孔開但候腹中空即三咽五咽任意連連咽之亦無定限仍不得過過三百咽待三年後氣得周還大通五臟養成骨髓堅益皮膚滿實即不限咽數多少仍須絶糧亦得如未滿三年為人先犯五勞七傷臟府抽損百關焦枯不能漸漸修補頓即絶糧以希延壽又加不能絶心世網營營六性財色依然唯知餓肚穀氣漸絶藥味不充新疾互生萬病俱臻思欲不死安可得乎又服氣之後須知食次第每日早食時喫少淡水粥即和得脾氣日晚足津液日午喫一兩箇淡麵餅煮蔥薤羹並得仍不得熱喫至晚間飢煮少淡麵餺飥硬和麵煮三二十沸喫之每喫飯並不得飽必須減三五口恆令內欠欠然始好如一頓併飽即氣道被壅不通妨一日之功矣特忌酥油粘膩食生菜蘿蔔陳臭等一切葷氣物並不得喫初時三五十日能不有些些飢餧思食巳後調得氣候腹中漸漸滋潤百味並不思之其所言喫粥及餅飥等並任臨時方便要喫即喫不必日别依此喫也大分食次第如此自取穩便淡水粥時復一餐亦佳耳又初服氣三膲通胃口開五臟和甘津生玉池美喫食甜猶如初病可人貪不知足一切物無不美者必須節之如信情任之必大損也乍可覺數數食耳夫每喫食了其食皆有毒并有五味熟氣每初食了即須開口呵吐之約口中熱氣退即止永無患也又須節監及辛酸等味不可喫初即以難及一二十日有津液靈泉出入鹹辛不得為服氣後五藏潤正氣下趂盡宿惡氣宿惡氣下泄即傷胃淨不得食冷熱粘膩生硬物如妄喫一口即物所住處微微覺痛用功深處後並亦自知但食軟熟之物必佳仍須食了即須呵之又每喫飯先喫三二十顆生椒水下即喫飯食了覺傷飽即更喫一二十顆椒亦好其椒通三膲趂下惡氣兼消宿食理引正氣如覺氣上心胸間悶即合三兩顆椒登時即散此椒功不可言也又匆飽悶氣滿即須靜坐調氣少時即散下泄舊經云固氣勿令下泄往時初學者依此固氣少時肚悶交慮見死下有二竅通上口鼻出入上下應為五臟先有宿惡氣須下出河得固却固却即氣不通泄氣不通泄即覺痛所以故氣未出新氣乍入兩氣相衝而能為患不須固之以通泄為妙又每日空腹隨性飲一兩盞酒大妙不可令至昏悶如日能涓涓飲三五盞大助氣道其酒仍須清好始堪飲之不得多一吐即數日氣不平復又遇樂欲得多飲即有法也人所以飲酒昏醉悶亂者蓋為酒有麴蘖之毒毒氣入四支即醉如正飲時十人五人同坐時時盞至每喫一盞了即開口呵吐七八氣其酒毒即出散如酒併到即大張口呵之如隨盞可微吐之凡常喘息中接出氣呵而送之如能終席調理不輟者凡曰能飲三升是日能飲一斗矣仍加不醉亦免中酒復不失酒味終日飲亦不退矣更候至睡覺依前漱咽調理平常如故又忽有泄氣來下時節無期或正喫食時或對賔客或騎鞍乘或對尊親或有氣來如何為計必須求方便下泄却若固一氣不泄便逆上臟胃中攪痛差心脅即良久不散一吐裏氣亂悶痛如公私無暇不得攝養則莫喫葷辛縱泄下氣氣亦不多臭若是絶榖後縱有一泄兩泄亦不臭也又有産生穢惡氣一切重病不可衝之深損正氣如忽須出入街中遇逢惡氣即閉氣過之不然須飲酒令有酒氣及喫少葷辛物亦能辟之如惡氣巳入覺不安穩即須調氣趂却又不用大作聲歌哭呌呼如人事不免吊問即須小作聲不可令泣過耳又忽氣逆上衝喉來勿放令上便咽令却下更納取氣咽之三五咽即定仍亦以手摩令下散也即含椒及飲酒便散如忽苦咽不下亦不須逼咽令上膲壅也作意消息臨時自察如氣未散且勿食又忽食飽即不得咽之咽之即被食隔不下便成病又每一咽即住口絶鼻喘息定以心送向外察其氣左邊下歷二十四節歷歷聞之如水度坎聲極分明有坎節也如不鳴即喫油膩不依節候之狀如不早消息即更服氣相逼必當病生尤須愼之又人初服者皆貪其功並歎其氣乃將多服為功每日或加十氣二十氣覺且安穩又更加三十五十氣日漸增之將為得在不知氣未通潤因結咸病腹內巳有病身仍未覺及至有徴不安仍將可在日加一日積以結成一結成氣病兩脅卒難方藥也如三年功成縱有觸犯並不妨服氣日至千咽巳上亦不懼矣至九年功終不退關節相連黃庭經云千千百百自相連一一十十如重山者即是筋骨相連著也如此五臟巳後可入水不溺內氣不出外氣不入即十日二十日亦得大寒大執一無懼憚或老或少並皆不恆夫氣須握固令為初氣未行未得握固待半年或百日覺氣通暢手掌中汗出即得握固也黃庭經曰閉塞三關握固停合漱金醴吞玉英遂至不飢三蟲亡意常和平致欣昌夫氣海在臍下人皆為二膲不通凡喘息不得過臍又加氣急喘不定者為氣未下只擁在上膲心胸如人初咽十日五日上膲未通十日外至二十日即合覺下歷關坎過入氣海鳴幽幽聲微覺氣轉也至氣海氣而長氣候和好也又舊經不子細但説及解禁忌使後人多袂此損却正氣中道虛休令此皆因修行曾有損益故重細述又調氣皆須細意出納不得耳聞聞即粗損正氣唯大熱呵少許不畏覺熱定即須細理之又人初服未解咽以一咽為候兼大鼓口引氣滿口始蹙而咽之解咽之後上膲又通即不鼓但兀然閉氣合口更不引吐連咽得三咽一吐即更咽又至八九咽一吐或至二十咽一吐或至三十咽一吐此即是氣下至氣海通暢筋脈通矣此者有時作意試察氣候長短通與不通亦不要長依此多咽多咽亦不是好不安穩也如取安穩一閉口一咽咽入以心送向下至氣海然更咽不須吐氣常行也又初服未知節度不免用心送下至及巳後知氣將息次第即息絶念但無思任意咽即各依分位更不要以手摩心送又經云何不言之教萬物作焉而不為生而不為有功成功成而不居不言之教者心處自然無為無念五臟六府而養生而不有者生道氣於身身不恃有兀然成功功成不居無見外行見即人知人知即我生我生即名至名至即禍來禍來即氣亡氣亡即滅矣故黃庭經云子能知一萬事畢又都舉半夜及五更并每日三時服氣時節兼喫食次第者為初功人未解具載之但深知之後並臨事細意自取方便勿執耳執即憂生憂生即繫之心繫心即心勞勞即功退矣志之志之仙經曰夫人臨終而始惜身罪定而思遷善疾成方求其藥又網巳發無可追之故賢人上士惜未危之命懼未禍之禍修未病之病此真為上士真名保愛亦云上年中年下年上年二十巳上三十巳下中年四十巳上五十巳下下年六十七十也其八十巳上罪位巳定上年為卑悟解正道識逹玄微髓實骨堅筋全肉滿發心履道無不成功中年者悟道巳晚筋肉骨髓各有其半處在進退功效即微下年者六十七十骨髓筋脈十有二三日暮功矣猶可救之八十巳上者腦竭髓盡萬關乾枯神謝氣亡尸行鬼步無可救也故先賢上士知風燭之難攝志心棄俗舍勞惜身為寶遂逸志幽嚴攝心歸道道者氣也氣者身之根也魚離水而將死人失道而難全養生務於修氣修氣者務於保精精氣兩全是名真實又人有三丹田上元中元下元上元丹田泥九腦也一名帝鄉中元中丹田心也亦名絳宮真人下元下丹田氣海亦名精門此三元各有神一神虧即氣漏精泄泄即氣散精者身之根根者氣之位精全即氣全精泄即氣泄唯精與氣直順全耳黃庭經曰長生至慎房中急何為死作令神泣若當決海百瀆傾葉去樹枯失青青故先賢忐道莫不愛氣保精而得全也鍊氣法又因服氣功餘暇取靜室無人處散髮脫衣覆被正身仰卧腳及手並須展勿握固淨席頭邉垂下著地其髮梳通理令散垂席上即調氣氣候得悶即口放令出初氣出喘急即且調氣七八下或十氣巳來急氣即定定又鍊之如此有暇且十鍊而止為初恐氣未通擁在皮膚不好更有餘睱又鍊之即更加五六鍊又漸加鍊至二十三十或四十五十並無限何以為則如服氣不久功漸成關節通毛孔開鍊至二十三十即合遍身潤汗出如得此狀即是功效也初鍊氣得通潤且止漸汗出即好也耳安穩卧不得早起衝風如病人得汗將息良久取淨衣著無風處徐徐行出步少言愛氣省事澄思即身輕百脈流注四支通暢故黃庭經云千災巳消百病痊不憚虎狼之凶殘亦以却老年永延夫鍊氣者每日夜頭及午時任得方便候神情清爽時即依前次第峻坐修咽勤勤常須致之不得墯慢恐昏悶須睡不得強坐強坐即却邪亂其意意邪即氣亂失正道也初服未有正氣即昏昏巳後亦無昏沉也夫鍊氣者即不得每日行之十日五日有餘暇覺不通暢四體煩悶即為之常日恐無功亦不用頻也委氣法夫養氣委氣者候四體清和志無思念或因坐或因卧任氣依門户調息凝然委身如委一衣放在床上無筋無骨無神無識縱心縱耳如此委衣亦忽為主寂沉寂沉放形委體澄神鍊氣即百節開張筋脈通暢津液流注因此便咽下十氣或至二十氣亦得每一咽皆須兀然任氣不得與意相爭良久氣便從百毛孔出不復更口吐也縱有十無一二復止即更調理數十息至百息巳上忽因喘息便又微含氣咽入即更調息調息稍覺四支皮肉關節一如沐浴相似每有暇不得仰卧側卧或坐或立即委氣委身行之其功日進精滿氣全神安魄定志間思遠道泰德寧三尸自亡六塵亦滅故黃庭經云間暇無事身體安虛無之居在惟間但無為養氣委身委心放形放思與道合體即自知異候黃庭經曰髙拱無為魂魄安清淨見神與我言此之謂也夫委氣者匆覺四體不和身有壅塞氣候不調即委之或卧或坐澄神委氣息念寂寂安心久久凝定即覺氣之流行無所不到也閉氣法夫上智之人志堅思遠一人修理無少遺功神定氣調絶其外病又有中智之人或家私未終或心有進退不依禁忌調攝乖冝氣壅不和反生其患如有苦處可入靜室仰卧熟調氣展手及足各相去四五寸仍須卧處厚軟冬月暖蓋被靜心坦然即便咽氣因即便閉氣口鼻不動以心念苦處以意相注使氣極即吐吐訖又閉每閉初吐後氣急即調六七下氣調順又閉之想念攻之或十或二十三十四十五十攻之所苦處覺汗出通潤即止如未可每日五更或夜頻意攻之以差為限如病在左手直入左手在右手直入右手如在頭直上頭分明見驗方知心能使氣氣意相從使氣如神憂慈哀樂不得在心憂則傷神樂則失志有疾依此無不除之也休糧法夫人欲休糧者但依前修行三年之後五臟養成體實肉滿百神歸位血脈通流氣道宣暢周遊無礙輕舉日新得至如此漸不用聞五味之氣常不思食須絶更無難也又有世人貪樂愛利未能絶志遂多尋方書服藥斷殼藥初入腹暫似充飽藥盡飢生循還無益加以常繫心於藥物求和合於終朝驅營驅營無少暫息力微智竭煩擾漸多不招其禍又雖服藥物何能頓絶於物或喫果子以助力或餐藥物而求飽唯加調理以自保養寧思逐藥物之勞疲鍊煮之弊勤勤嵗月虛役精神返老還齡何可能得唯不食米何名為休糧乎其中有下士未能頓絶世務者且服藥相助亦有小益上士不理此道凡服氣功成休糧但肚中空即咽氣不問早晚更無滯礙須咽即咽亦無限數自覺有節候亦不得多咽為久服乃至絶糧並自解不煩具載如初功欲得藥助兼氣服亦得服藥者多不服氣但以藥物為事黃庭經云百穀之實土地精五味外美邪魔腥臭亂神明胎氣零從此反老得還嬰又有在仕之人身居榮祿世務未寧慕道思真不能息志也懷心嵗月虛積勤勞候絶色塵蹉跎衰暮豈能固執不漸修之其在仕之人為公務驅迫不可得日依三時修養但取夜半或五更候睡覺即依前法漱咽津液調取氣候去却下膲熱即咽取四十五十咽初從一二十咽日加五咽至五十咽巳來且止及明縱有公事但存真立志行矣太清調氣經終
